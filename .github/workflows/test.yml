name: Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Make scripts executable
      run: |
        chmod +x tests/test-skill-format.sh
        chmod +x tests/validate-c4-diagram.sh
        
    - name: Run Skill Validation Tests
      run: |
        cd tests
        ./test-skill-format.sh
