version: '3.8'

# Defines the containers for the Internet Banking System
services:
  spa:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - api
      
  api:
    build: ./api
    ports:
      - "3000:3000"
    depends_on:
      - db
      
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: banking
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    # Stores user registration information, hashed authentication credentials, access logs, etc.
